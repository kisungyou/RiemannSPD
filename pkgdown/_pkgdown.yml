url: https://kisungyou.com/RiemannSPD

destination: docs

authors:
  Kisung You:
    href: https://kisungyou.com

template:
  bootstrap: 5
  bslib:
    border-radius: 0.5rem
    btn-border-radius: 0.25rem
  params:
    bootswatch: flatly
#ganalytics: UA-163713603-1

home:
  strip_header: true

navbar:
  title: "RiemannSPD"
  left:
    - text: "Functions"
      href: reference/index.html
    - text: "News"
      href: news/index.html
    - text: "Other Packages"
      menu:
        - text: "Riemann"
          href: https://CRAN.R-project.org/package=Riemann
        - text: "Rdimtools"
          href: https://kisungyou.com/Rdimtools/
  right:
    - icon: fa-twitter
      href: https://twitter.com/kisung_you
    - icon: fa-github
      href: https://github.com/kisungyou/RiemannSPD
    - icon: fa-envelope
      href: mailto:kisungyou@outlook.com

reference:
  - title: "Preparation"
    contents:
      - has_concept("prepare")
  - title: "[1] Basic Operations"
    contents:
      - has_concept("basic")
  - title: "[2] Statistical Inference"
    contents:
      - has_concept("inference")
  - title: "[3] Low-Dimensional Representation"
    contents:
      - has_concept("LDR")
  - title: "[4] Clustering"
    contents:
      - has_concept("cluster")
  - title: "[5] Data Harmonization"
    contents:
      - has_concept("harmony")
